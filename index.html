<!DOCTYPE html> <!-- avisa o navegador que o arquivo é atualizado e é html5-->
<HTML>  <!--inicio de todo código do site, a estrutura inicial-->
<head>  <!-- chamada de configurações internas da pagina-->
<title>Meu primeiro Site</title> <!-- o nome que vai aparecer na aba do navegador-->
   <!-- 
    ===========================================================================
    BIBLIOTECA DE FONTES EXTERNAS (FUTURO)
    
    O que é isso: Quando você quiser usar fontes personalizadas da internet, 
    você vai acessar o site: https://google.com
    Lá você escolherá a fonte e colará os links gerados aqui dentro do <head>.
    
    Por estarem dentro destas marcações de comentário, as linhas abaixo 
    estão "desativadas" e o navegador vai ignorá-las por enquanto.
    ===========================================================================
   -->
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
   
<!-- aqui começa a parte somente de css que é onde fica dentro do style(esse traço de coments diferente é referente ao css tbm -->
<style>
     /* Faz a página ocupar a altura inteira da tela do computador */
     html, body {
         margin: 0; /* margem */
         padding: 0; /* preenchimento interno*/
         height: 100%; /* altura/*
}
/* Aplica os comandos de centralizar no corpo do site */
     body {
           display: flex;           /*ativa o modo do alinhamento */
           flex-direction: column; /* força os elementos a ficarem um abaixo do outro*/
           justify-content: center;   /* centraliza na horizontal(esquerda/direita) */
           align-itens: center;      /* centraliza na vertical (cima/baixo) */
           text-align: center;        /*garante que as linhas de texto fiquem alinhadas entre si*/

}
</style>
</head> <!-- fim das configurações internas-->
<!-- ============================================================================================ 
   font-family: 'Segoe UI', sans-serif; Explicação: O navegador tentará carregar a 'Segoe UI' (fonte moderna do Windows). Se o usuário estiver num computador muito antigo ou Mac que não a tenha, a vírgula joga para                                                                                                                                                                                                                                                                                                                                                                                                                                         a segunda opção 'sans-serif'.
   inicio de todo conteúdo visível na tela
   =================================================================================================== -->

<body style="background-color: #87CEFA; font-family: Orbitron;">

   <!--===================== meu titulo principal e subtitulo ======================================-->
     <h1 style="color: #FDD700;"> O inicio de tudo! 07/07/26 </h1>
   <!-- ================= forma mas comum e simples de criar um espaço entre as linhas, posso utilizar o "margin-bottom" tbm mas tem que ser ao lado dos codigos principais h ou p ======================= -->  
     <br> 
     <h2 style="color: #000000;"> aprendendo sobre este novo mundo </h2>

   <!--============== o paragrafo do meu texto comum ===========-->
     <p> Começando por este site básico.</p>
     <p> Meu primeiro site criado do zero, espero densevolve-lo com o passar do tempo mantendo a mesma          escencia que a de agora</p>

   <!-- FIM do conteúdo visivel, esse simbolo é oq poe para finalização de uma tag-->
</body>
</html>
